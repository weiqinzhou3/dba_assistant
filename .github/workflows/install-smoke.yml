name: Install Smoke

on:
  push:
  pull_request:

jobs:
  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run install smoke test
        run: bash scripts/smoke_install.sh
