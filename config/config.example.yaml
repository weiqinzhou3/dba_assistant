model:
  preset_name: dashscope_cn_qwen35_flash
  provider_kind: openai_compatible
  model_name: qwen3.5-flash
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: replace-with-your-dashscope-api-key
  temperature: 0.0
  max_turns: 8
  tracing_disabled: true
runtime:
  default_output_mode: summary
  redis_socket_timeout: 5.0
agent:
  filesystem_backend:
    kind: filesystem
    root_dir: outputs/agent_fs
    virtual_mode: true
paths:
  artifact_dir: outputs/agent_fs/artifacts
  evidence_dir: outputs/agent_fs/evidence
  temp_dir: outputs/agent_fs/tmp
