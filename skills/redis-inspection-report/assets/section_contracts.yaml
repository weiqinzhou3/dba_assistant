    - 风险描述
    - 涉及对象
    - 影响说明
    - Review
    - 证据
    - 整改建议
  required_fields:
    - 风险等级
    - 风险描述
    - 涉及对象
    - 影响说明
    - 证据
    - 整改建议
  optional_fields:
    - Review
  bold_labels:
    - 风险等级
    - 风险描述
    - 涉及对象
    - 影响说明
    - Review
    - 证据
    - 整改建议
  review_field:
